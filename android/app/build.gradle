plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.priv_guard"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.priv_guard"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

// The tflite_flutter (0.11.0) plugin bundles the native TFLite runtime from
// org.tensorflow:tensorflow-lite:2.11.0. The current PII model is exported with
// TF 2.17, which emits a FULLY_CONNECTED op at version 12 that the 2.11.0 runtime
// cannot register ("Didn't find op for builtin opcode 'FULLY_CONNECTED' version '12'"),
// so the interpreter fails to load. Force the newer runtime that supports it.
configurations.all {
    resolutionStrategy {
        force "org.tensorflow:tensorflow-lite:2.17.0"
        force "org.tensorflow:tensorflow-lite-gpu:2.17.0"
    }
}
